<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherForge 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font:14px system-ui;display:flex;height:100vh;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
#side{width:280px;background:#12121a;border-right:1px solid #2a2a3a;padding:12px;overflow-y:auto;font-size:12px}
#side h2{font-size:14px;color:#8888cc;margin-bottom:8px}
#side h3{font-size:12px;color:#8888cc;margin:10px 0 5px}
.info{background:#1a1a26;padding:6px 10px;border-radius:4px;margin:3px 0;font-size:11px}
.ent{background:#1a1a26;padding:4px 8px;border-radius:4px;margin:2px 0;font-size:11px;cursor:pointer;transition:background .2s}
.ent:hover{background:#2a2a3a}
.ent.selected{background:#2a2a5a;border:1px solid #446}
.btn{background:#2a2a3a;border:1px solid #444;color:#ccc;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin:2px}
.btn:hover{background:#3a3a4a}
#view{flex:1;position:relative;overflow:hidden}
#info3d{position:absolute;bottom:12px;left:12px;background:rgba(0,0,0,.75);padding:6px 12px;border-radius:4px;font:11px monospace;color:#aaccaa;pointer-events:none}
#controls{position:absolute;top:12px;right:12px;display:flex;gap:4px}
select{background:#2a2a3a;color:#ccc;border:1px solid #444;border-radius:4px;font-size:11px;padding:2px 5px}
</style>
</head>
<body>
<div id="side">
  <h2>AetherForge 3D</h2>
  <div class="info">Tick: <span id="tick">0</span> | Time: <span id="gt">0.0</span>s</div>
  <div class="info">Entities: <span id="ec">0</span> | Lights: <span id="lc">0</span></div>
  <h3>View</h3>
  <div>
    <button class="btn" onclick="resetCamera()">Reset Camera</button>
    <button class="btn" onclick="toggleOrbit()">Orbit</button>
    <button class="btn" onclick="toggleWireframe()">Wire</button>
    <select onchange="setViewMode(this.value)">
      <option value="perspective">Perspective</option>
      <option value="top">Top</option>
      <option value="side">Side</option>
      <option value="free" selected>Free</option>
    </select>
  </div>
  <h3>Entities</h3>
  <div id="elist"></div>
</div>
<div id="view">
  <div id="controls">
    <button class="btn" onclick="fetch('/api/tools/pause',{method:'POST'})">Pause</button>
    <button class="btn" onclick="fetch('/api/tools/resume',{method:'POST'})">Resume</button>
  </div>
  <div id="info3d">Click entity to inspect</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";

// --- Setup ---
const container = document.getElementById("view");
const w = container.clientWidth;
const h = container.clientHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a22);
scene.fog = new THREE.Fog(0x1a1a22, 20, 50);

const camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
camera.position.set(0, 5, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.prepend(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(w, h);
labelRenderer.domElement.style.position = "absolute";
labelRenderer.domElement.style.top = "0";
labelRenderer.domElement.style.pointerEvents = "none";
container.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 2;
controls.maxDistance = 100;

// --- Lights ---
const ambient = new THREE.AmbientLight(0x222233, 0.3);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x445566, 0x221111, 0.6);
scene.add(hemiLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a22,
  roughness: 0.9,
  metalness: 0.0,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const grid = new THREE.GridHelper(50, 50, 0x333355, 0x222244);
grid.position.y = -0.49;
scene.add(grid);

// --- Entity meshes ---
const entityMeshes = new Map(); // entity_id -> THREE.Mesh
const entityLabels = new Map(); // entity_id -> CSS2DObject

const geometryCache = {
  box: new THREE.BoxGeometry(1, 1, 1),
  sphere: new THREE.SphereGeometry(0.5, 16, 16),
  plane: new THREE.PlaneGeometry(1, 1),
  cylinder: new THREE.CylinderGeometry(0.5, 0.5, 1, 16),
  torus: new THREE.TorusGeometry(0.5, 0.2, 8, 16),
  capsule: new THREE.CapsuleGeometry(0.5, 0.5, 8, 16),
  cone: new THREE.ConeGeometry(0.5, 1, 16),
};

function colorStrToHex(c) {
  if (typeof c === "number") return c;
  if (c.startsWith("#")) return parseInt(c.slice(1), 16);
  return 0x888888;
}

function createMesh(meshData, name, entityType) {
  if (!meshData) meshData = { geometry: "box", color: "#888888" };
  const geo = geometryCache[meshData.geometry] || geometryCache.box;
  const color = colorStrToHex(meshData.color || "#888888");
  const emissive = colorStrToHex(meshData.emissive || "#000000");
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: emissive,
    metalness: meshData.metalness || 0,
    roughness: meshData.roughness || 0.8,
    transparent: meshData.transparent || false,
    opacity: meshData.opacity || 1.0,
    wireframe: meshData.wireframe || false,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.entityName = name;
  mesh.userData.entityType = entityType;
  return mesh;
}

function createLabel(name) {
  const div = document.createElement("div");
  div.textContent = name || "?";
  div.style.color = "#aaa";
  div.style.fontSize = "11px";
  div.style.fontFamily = "system-ui";
  div.style.textShadow = "0 1px 3px rgba(0,0,0,0.8)";
  div.style.background = "rgba(0,0,0,0.4)";
  div.style.padding = "1px 6px";
  div.style.borderRadius = "3px";
  div.style.pointerEvents = "none";
  return new CSS2DObject(div);
}

function updateScene(sceneState) {
  if (!sceneState) return;
  const currentIds = new Set();

  // Update/create entities
  for (const ent of sceneState.entities || []) {
    const eid = ent.id;
    currentIds.add(eid);
    let mesh = entityMeshes.get(eid);

    if (!mesh) {
      mesh = createMesh(ent.mesh, ent.name, ent.type);
      scene.add(mesh);
      entityMeshes.set(eid, mesh);

      const label = createLabel(ent.name);
      scene.add(label);
      entityLabels.set(eid, label);
    }

    // Update transform
    const tf = ent.transform || {};
    const pos = tf.position || {};
    const rot = tf.rotation || {};
    const scale = tf.scale || {};

    mesh.position.set(pos.x || 0, (pos.y || 0) * -1 + 1, pos.z || 0);
    mesh.rotation.set(rot.x || 0, rot.y || 0, rot.z || 0);
    mesh.scale.set(scale.x || 1, scale.y || 1, scale.z || 1);

    // Update label
    const label = entityLabels.get(eid);
    if (label) {
      label.position.copy(mesh.position);
      label.position.y += 1.0;
    }

    // Update material
    if (ent.mesh && mesh.material) {
      const md = ent.mesh;
      mesh.material.color.setHex(colorStrToHex(md.color || "#888888"));
      mesh.material.emissive.setHex(colorStrToHex(md.emissive || "#000000"));
      if (md.metalness !== undefined) mesh.material.metalness = md.metalness;
      if (md.roughness !== undefined) mesh.material.roughness = md.roughness;
      if (md.wireframe !== undefined) mesh.material.wireframe = md.wireframe;
      mesh.material.needsUpdate = true;
    }
  }

  // Remove stale entities
  for (const [eid, mesh] of entityMeshes) {
    if (!currentIds.has(eid)) {
      scene.remove(mesh);
      entityMeshes.delete(eid);
      const label = entityLabels.get(eid);
      if (label) {
        scene.remove(label);
        entityLabels.delete(eid);
      }
    }
  }

  // Update UI
  document.getElementById("tick").textContent = sceneState.tick || 0;
  document.getElementById("gt").textContent = (sceneState.game_time || 0).toFixed(1);
  document.getElementById("ec").textContent = (sceneState.entities || []).length;
  document.getElementById("lc").textContent = (sceneState.lights || []).length;

  // Entity list
  const list = document.getElementById("elist");
  list.innerHTML = "";
  for (const ent of sceneState.entities || []) {
    const d = document.createElement("div");
    d.className = "ent";
    d.textContent = `${ent.name || "?"} (${ent.type || "?"})`;
    d.onclick = () => {
      const mesh = entityMeshes.get(ent.id);
      if (mesh) {
        controls.target.copy(mesh.position);
        document.getElementById("info3d").textContent =
          `Selected: ${ent.name} | Pos: ${mesh.position.x.toFixed(1)}, ${mesh.position.y.toFixed(1)}`;
      }
    };
    list.appendChild(d);
  }
}

// --- API polling ---
let paused = false;
async function poll() {
  try {
    const resp = await fetch("/api/game-state-3d");
    if (resp.ok) {
      const state = await resp.json();
      updateScene(state);
    }
  } catch (e) {
    // Server not running yet
  }
  setTimeout(poll, 100);
}
poll();

// --- Animation loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

// --- Resize ---
window.addEventListener("resize", () => {
  const w2 = container.clientWidth;
  const h2 = container.clientHeight;
  camera.aspect = w2 / h2;
  camera.updateProjectionMatrix();
  renderer.setSize(w2, h2);
  labelRenderer.setSize(w2, h2);
});

// --- Global functions ---
window.resetCamera = () => {
  camera.position.set(0, 5, 15);
  controls.target.set(0, 0, 0);
  controls.update();
};

window.toggleOrbit = () => {
  controls.autoRotate = !controls.autoRotate;
};

window.toggleWireframe = () => {
  for (const [_, mesh] of entityMeshes) {
    if (mesh.material) {
      mesh.material.wireframe = !mesh.material.wireframe;
      mesh.material.needsUpdate = true;
    }
  }
};

window.setViewMode = (mode) => {
  const dist = camera.position.distanceTo(controls.target);
  switch (mode) {
    case "top":
      camera.position.set(0, 20, 0.01);
      controls.target.set(0, 0, 0);
      break;
    case "side":
      camera.position.set(15, 2, 0);
      controls.target.set(0, 0, 0);
      break;
    case "perspective":
      camera.position.set(8, 6, 12);
      controls.target.set(0, 0, 0);
      break;
    default: // free - keep current
      break;
  }
  controls.update();
};
</script>
</body>
</html>
