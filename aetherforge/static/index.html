<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherForge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0e0;font:14px system-ui;display:flex;height:100vh;overflow:hidden}
#side{width:200px;background:#0d0d18;border-right:1px solid #1a1a3a;padding:16px}
#side h1{font-size:16px;color:#4488ff;margin-bottom:12px}
.stat{background:#12122a;border:1px solid #1a1a4a;border-radius:6px;padding:8px 12px;margin:6px 0}
.stat-label{font-size:10px;color:#666}
.stat-value{font-size:20px;font-weight:700}
.controls{font-size:11px;color:#888;margin-top:12px;line-height:1.8}
.controls kbd{background:#1a1a3a;border:1px solid #333;border-radius:3px;padding:1px 5px;font-size:10px;color:#ccc}
#view{flex:1;position:relative;background:#0a0a12}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<div id="side">
  <h1>AETHERFORGE</h1>
  <div class="stat"><div class="stat-label">TICK</div><div class="stat-value" id="tick" style="color:#4488ff">0</div></div>
  <div class="stat"><div class="stat-label">ENTITIES</div><div class="stat-value" id="ecount" style="color:#44ff88">0</div></div>
  <div class="stat"><div class="stat-label">PLAYER</div><div class="stat-value" id="pinfo" style="color:#ffaa44;font-size:14px">-</div></div>
  <div class="controls">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move<br>
    <kbd>Space</kbd> / <kbd>J</kbd> Action<br>
    <kbd>E</kbd> Interact<br>
    <kbd>Esc</kbd> Pause
  </div>
</div>
<div id="view"><canvas id="cv"></canvas></div>
<script>
(function(){
var cv=document.getElementById("cv"),ctx=cv.getContext("2d");
var gs=null,lt=0,keys={},frame=0,errDiv=null;

// Debug bar
errDiv=document.createElement("div");
errDiv.id="dbg";
errDiv.style.cssText="position:fixed;bottom:0;left:0;right:0;background:#c00;color:#fff;padding:8px;font:12px monospace;z-index:999;display:none";
document.body.appendChild(errDiv);
function dbg(msg){errDiv.style.display="block";errDiv.textContent=msg;}

function resize(){
  var v=document.getElementById("view");
  cv.width=v.clientWidth||800;
  cv.height=v.clientHeight||600;
  ctx.fillStyle="#0a0a12"; ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle="#4488ff"; ctx.font="16px system-ui";
  ctx.fillText("AetherForge Engine",10,30);
}
resize();
window.addEventListener("resize",resize);

// Input
document.onkeydown=function(e){
  keys[e.key]=true;
  if(e.key.length==1||e.key.startsWith("Arrow"))e.preventDefault();
};
document.onkeyup=function(e){keys[e.key]=false};

// Render: draw all entities generically based on their visual/type
function dr(){
  var w=cv.width,h=cv.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#0a0a12"; ctx.fillRect(0,0,w,h);

  if(!gs||!gs.entities){
    ctx.fillStyle="#4488ff"; ctx.font="14px system-ui";
    ctx.fillText("Connecting...",20,60);
    return;
  }

  // Camera: center on player if one exists
  var cx=0, cy=0;
  for(var i=0;i<gs.entities.length;i++){
    if(gs.entities[i].is_player){
      cx=w/2-gs.entities[i].x;
      cy=h/2-gs.entities[i].y;
      break;
    }
  }

  // HUD
  ctx.fillStyle="rgba(255,255,255,0.25)";
  ctx.font="11px monospace";
  ctx.fillText("Tick:"+gs.tick+" Ent:"+gs.entities.length,8,h-8);
  document.getElementById("tick").textContent=gs.tick;
  document.getElementById("ecount").textContent=gs.entities.length;
  var pi=document.getElementById("pinfo");
  for(var i=0;i<gs.entities.length;i++){if(gs.entities[i].is_player){
    pi.textContent=gs.entities[i].name||gs.entities[i].id;
    break;
  }}

  // Draw each entity
  for(var i=0;i<gs.entities.length;i++){
    var e=gs.entities[i];
    var x=e.x+cx, y=e.y+cy;
    var ew=e.width||32, eh=e.height||32;
    if(x<-ew||x>w+ew||y<-eh||y>h+eh)continue;

    ctx.fillStyle=e.color||"#888";

    if(e.shape=="circle"){
      ctx.beginPath();
      ctx.arc(x+ew/2,y+eh/2,Math.min(ew,eh)/2,0,Math.PI*2);
      ctx.fill();
    }else if(e.shape=="triangle"){
      ctx.beginPath();
      if(e.type=="enemy"){
        ctx.moveTo(x+ew/2,y+eh); ctx.lineTo(x+ew,y); ctx.lineTo(x,y);
      }else{
        ctx.moveTo(x+ew/2,y); ctx.lineTo(x+ew,y+eh); ctx.lineTo(x,y+eh);
      }
      ctx.closePath(); ctx.fill();
    }else{
      ctx.fillRect(x,y,ew,eh);
    }

    // Label
    if(e.name&&e.name!=e.id){
      ctx.fillStyle="rgba(255,255,255,0.5)";
      ctx.font="10px sans-serif";
      ctx.fillText(e.name,x,y-4);
    }

    // Player indicator
    if(e.is_player){
      ctx.strokeStyle="rgba(255,255,255,0.3)";
      ctx.lineWidth=1;
      ctx.strokeRect(x-2,y-2,ew+4,eh+4);
    }
  }
}

function lp(ts){
  frame++;
  var dt=Math.min((ts-lt)/1000,0.05);lt=ts;
  if(dt<=0)dt=0.016;

  // Package all input for the generic tick
  var payload={
    up:!!(keys["w"]||keys["W"]||keys["ArrowUp"]),
    down:!!(keys["s"]||keys["S"]||keys["ArrowDown"]),
    left:!!(keys["a"]||keys["A"]||keys["ArrowLeft"]),
    right:!!(keys["d"]||keys["D"]||keys["ArrowRight"]),
    dt:dt
  };

  var x=new XMLHttpRequest();
  x.open("POST","/api/tick",true);
  x.setRequestHeader("Content-Type","application/json");
  x.onload=function(){
    try{
      var r=JSON.parse(x.responseText);
      if(r.error)dbg("Err: "+r.error);
      gs=r;
    }catch(e){dbg("Parse: "+e.message);}
    dr();
    requestAnimationFrame(lp);
  };
  x.onerror=function(){requestAnimationFrame(lp)};
  x.send(JSON.stringify(payload));
}

// Init
lt=performance.now();
// Setup: clear world. Create a default player entity so something shows.
var setupPayload={create_player:true,position:{x:400,y:300},visual:{color:"#00ccff",shape:"rectangle"},size:{width:28,height:28}};
var x=new XMLHttpRequest();
x.open("POST","/api/setup",true);
x.setRequestHeader("Content-Type","application/json");
x.onload=function(){
  try{
    var r=JSON.parse(x.responseText);
    if(!r.success)dbg("Setup: "+(r.error||"fail"));
  }catch(e){}
  dr();
  lp(lt);
};
x.onerror=function(){lp(lt)};
x.send(JSON.stringify(setupPayload));
})();
</script>
</body>
</html>
